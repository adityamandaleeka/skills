name: msbuild-antipatterns
description: Evaluates the dotnet-msbuild/msbuild-antipatterns skill
type: capability
config:
  timeout: 160
stimuli:
  - name: Review MSBuild files for anti-patterns and style issues
    prompt: Review all MSBuild project files and build infrastructure (Directory.Build.props, Directory.Build.targets) in
      this solution for correctness, best practices, and anti-patterns. Identify any issues that could cause subtle bugs
      or unexpected behavior.
    environment:
      files:
        - src: .
          dest: .
    graders:
      - type: output-matches
        config:
          pattern: (Directory\.Build\.props|Directory\.Build\.targets)
      - type: output-matches
        config:
          pattern: (anti-pattern|anti pattern|issue|problem)
      - type: prompt
      - type: pairwise
    rubric:
      - Identified hardcoded absolute paths for OutputPath
      - Identified property defaults in Directory.Build.targets that should be in .props, causing LibB's
        TreatWarningsAsErrors override to be silently ignored
      - Identified TargetFramework condition in .props that silently fails because TFM is empty during .props evaluation
      - Identified DefineConstants overwrites existing constants instead of appending
      - Identified analyzer PackageReference missing PrivateAssets, unquoted MSBuild condition, mixed Include/Update in
        same ItemGroup, or Exec instead of Message task
